<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aura Demo</title>

	<script src="Aura.js"></script>
	<script>
		const aura = new Aura();

		function setColor(ev) {
			console.log(ev)
		}
	</script>
</head>
<body>
	<button onclick="aura.init()">Open device</button>
	<input type="color" name="color" id="color" onchange="setColor(this)">
</body>
</html>
