<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aura Demo</title>

	<script src="Aura.js"></script>
	<script>
		const aura = new Aura();

		function setColor(hex) {
			const r = parseInt(hex.substring(1, 3), 16);
			const g = parseInt(hex.substring(3, 5), 16);
			const b = parseInt(hex.substring(5, 7), 16);
			aura.setColor(r, g, b);
		}

		window.onerror = alert;
	</script>
</head>
<body onerror="alert">
	<button onclick="aura.init()">Open device</button>
	<input type="color" name="color" id="color" oninput="setColor(this.value)">
</body>
</html>
